      <div class="container">

         <main class="gallerypage">
            <h2>Photo Gallery</h2>

            <input type="radio" name="photo" id="photo1" checked>
            <input type="radio" name="photo" id="photo2">
            <input type="radio" name="photo" id="photo3">
            <input type="radio" name="photo" id="photo4">
            <input type="radio" name="photo" id="photo5">
            <input type="radio" name="photo" id="photo6">
            <input type="radio" name="photo" id="photo7">
            <input type="radio" name="photo" id="photo8">

            <div class="gallery-main">
               <figure>
                  <img src="photo1.jpg" alt="Rider carving through glowing sunset powder during an evening session.">
                  <figcaption>Evening session, sunset powder.</figcaption>
               </figure>
               <figure>
                  <img src="photo2.jpg" alt="A snowboarder launches above a steep alpine face beneath dramatic clouds.">
                  <figcaption>Alpine launch beneath dramatic clouds.</figcaption>
               </figure>
               <figure>
                  <img src="photo3.jpg" alt="Urban street rider approaches a steep rail setup beside an industrial building.">
                  <figcaption>Urban rail, industrial backdrop.</figcaption>
               </figure>
               <figure>
                  <img src="photo4.jpg" alt="A snowboarder disappears into a massive spray of fresh powder.">
                  <figcaption>Lost in fresh powder.</figcaption>
               </figure>
               <figure>
                  <img src="photo5.jpg" alt="Silhouette of a rider charging through a wave of snow at dusk.">
                  <figcaption>Charging through snow at dusk.</figcaption>
               </figure>
               <figure>
                  <img src="photo6.jpg" alt="A distant snowboarder framed through the hollow of a tree trunk.">
                  <figcaption>Framed through the trees.</figcaption>
               </figure>
               <figure>
                  <img src="photo7.jpg" alt="Freestyle rider floats above a jump against a clear mountain skyline.">
                  <figcaption>Floating above the skyline.</figcaption>
               </figure>
               <figure>
                  <img src="photo8.jpg" alt="Rider cuts through untouched powder surrounded by shifting shadows.">
                  <figcaption>Untouched powder, shifting shadows.</figcaption>
               </figure>
            </div>

            <nav class="gallery">
               <label for="photo1"><img src="photo1.jpg" alt="Rider carving through glowing sunset powder during an evening session."></label>
